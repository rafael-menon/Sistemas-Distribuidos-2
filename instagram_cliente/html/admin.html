<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagrão - Painel de Administração</title>
    <link rel="stylesheet" href="/css/admin.css">
    <script src="/js/admin.js" defer></script>
</head>
<body>

<nav>
    <a href="/html/feed.html" class="logo">Instagrão</a>
    <div>
        <a href="/html/feed.html" style="text-decoration: none; color: black; margin-right: 15px;">Voltar ao Feed</a>
    </div>
</nav>

<main>
    <h2>Painel do Administrador</h2>
    
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Usuário</th>
                <th>E-mail</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela">
            <tr><td colspan="5" style="text-align: center;">Carregando usuários...</td></tr>
        </tbody>
    </table>

    <div id="modal-edicao">
        <h3 style="margin-bottom: 15px;">Editando Usuário #<span id="id-alvo"></span></h3>
        <div class="form-group"><label>Nome</label><input type="text" id="edit-nome"></div>
        <div class="form-group"><label>Usuário</label><input type="text" id="edit-usuario"></div>
        <div class="form-group"><label>Email</label><input type="email" id="edit-email"></div>
        
        <button class="btn-salvar" onclick="salvarEdicao()">Salvar Alterações</button>
        <button class="btn-cancelar" onclick="fecharEdicao()">Cancelar</button>
    </div>

    <div id="mensagem"></div>
</main>
