<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagrão - Conectar Servidor</title>
    <link rel="stylesheet" href="/css/conectar.css">
    <script src="/js/conectar.js" defer></script>
</head>
<body>

    <div class="container">
        <h1 class="logo">Instagrão</h1>
        <p>Para começar, conecte-se ao servidor informando o IP e a porta.</p>
        
        <form id="form-conectar">
            <input type="text" id="input-url" placeholder="Ex: http://192.168.0.50:8080" required>
            <button type="submit">Conectar</button>
        </form>
    </div>
</body>
</html>
