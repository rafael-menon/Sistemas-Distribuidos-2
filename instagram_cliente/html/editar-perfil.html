<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Instagram - Meu Perfil</title>
        <link rel="stylesheet" href="/css/editar-perfil.css" />
        <link rel="icon" type="image/png" href="/assets/logo.png">
        <script src="/js/shared/api.js" defer></script>
        <script src="/js/shared/util.js" defer></script>
        <script src="/js/shared/auth.js" defer></script>
        <script src="/js/shared/user.js" defer></script>
        <script src="/js/editar-perfil.js" defer></script>
    </head>
    <body>
        <nav>
            <a href="/html/feed.html" class="logo">Instagram</a>
            <div class="menu-items">
                <a href="/html/feed.html">Feed</a>
                <a
                    href="/html/admin.html"
                    id="link-admin"
                    style="display: none; color: #0095f6"
                    >Painel Admin</a
                >
                <a href="#" class="btn-sair" onclick="logout()">Sair</a>
            </div>
        </nav>

        <main>
            <h2>Editar Perfil</h2>

            <form id="form-perfil">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="edit-nome" required />
                </div>

                <div class="form-group">
                    <label>Nome de Usuário</label>
                    <input type="text" id="edit-usuario" required />
                </div>

                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="edit-email" required />
                </div>

                <div class="form-group">
                    <label>Biografia</label>
                    <textarea
                        id="edit-bio"
                        placeholder="Fale um pouco sobre você..."
                    ></textarea>
                </div>

                <!-- <div class="form-group">
                    <label>URL da Foto de Perfil</label>
                    <input
                        type="text"
                        id="edit-foto"
                        placeholder="http://link-da-sua-foto.com/foto.jpg"
                    />
                </div> -->

                <div class="form-group">
                    <label>Nova Senha</label>
                    <input type="password" id="edit-senha" />
                </div>

                <button type="submit">Salvar Alterações</button>
            </form>

            <button type="button" class="btn-deletar" onclick="deletarConta()">
                Deletar Conta
            </button>

            <div id="mensagem"></div>
        </main>
    </body>
</html>
